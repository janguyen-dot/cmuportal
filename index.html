<!DOCTYPE html>
<html>
<head>
  <title>Applicant Portal</title>

  <style>
    /* Make padding consistent in width calculation */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background:#f5f7fb; /* page background */
      text-align:center;
      margin:0;
      padding:0;
    }

    .portal-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh; /* center portal vertically */
    }

    .portal{
      background: rgba(255,255,255,0.95); /* slightly transparent */
      padding:40px;
      width:350px;
      box-shadow:0 0 15px rgba(0,0,0,0.2);
      border-radius:10px;
      text-align:center;
    }

    .logo{
      width:120px;
      margin-bottom:30px;
    }

    h2 {
      margin-bottom: 30px;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      font-size: 16px;
      border:1px solid #ccc;
      border-radius:6px;
    }

    button {
      background: #FF6F61;   /* custom color */
      color: white;
      padding: 14px;
      width: 100%;           /* same width as inputs */
      display: block;
      border: none;
      border-radius:6px;
      cursor: pointer;
      font-size: 16px;
      margin-top:15px;
      transition: background 0.3s;
    }

    button:hover {
      background: #e85b50;   /* slightly darker on hover */
    }
  </style>
</head>

<body>

<div class="portal-container">
  <div class="portal">
    <img src="logo.png" class="logo" alt="University Logo">
    <h2>Applicant Portal</h2>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button onclick="location.href='dashboard.html'">Login</button>
  </div>
</div>

</body>
</html>
