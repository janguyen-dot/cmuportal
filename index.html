<!DOCTYPE html>
<html>
<head>
  <title>Applicant Portal</title>

  <style>
    body{
      font-family: Arial;
      background:#f5f7fb; /* page background */
      text-align:center;
      margin-top:120px;
    }

    .portal{
      background: rgba(255,255,255,0.9); /* slightly transparent so logo shows behind */
      padding:40px;
      width:350px;
      margin:auto;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      border-radius:8px;
    }

    input{
      width:100%;
      padding:10px;
      margin:10px 0;
    }

    button {
      background: #FF6F61;   /* your new color */
      color: white;          /* text color */
      padding: 16px;         /* height of the button */
      width: 100%;           /* same as inputs */
      display: block;        /* ensures it takes full width */
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .logo{
      width:120px;
      margin-bottom:40px;
    }
  </style>
</head>

<body>

<div class="portal">
  <!-- logo goes here, inside portal -->
  <img src="logo.png" class="logo" alt="University Logo">

  <h2>Applicant Portal</h2>

  <input placeholder="Email">
  <input type="password" placeholder="Password">

  <button onclick="location.href='dashboard.html'">Login</button>
</div>

</body>
</html>
