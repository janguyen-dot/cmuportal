<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMU — Applicant Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sofi-blue: #00A2C7;
    --sofi-blue-dark: #007FA0;
    --sofi-blue-light: #E0F6FB;
    --sofi-blue-mid: #B3E8F5;
    --dark: #0D1B2A;
    --muted: #7A96A8;
    --bg: #F4FAFB;
    --white: #FFFFFF;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Floating background circles — same motif as dashboard */
  .bg-circles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
  .bg-circles span { position: absolute; border-radius: 50%; background: var(--sofi-blue); opacity: 0.06; animation: floatDot linear infinite; }
  .bg-circles span:nth-child(1) { width:180px;height:180px;top:-60px;left:10%;animation-duration:18s; }
  .bg-circles span:nth-child(2) { width:80px;height:80px;top:15%;left:75%;animation-duration:14s;animation-delay:-4s; }
  .bg-circles span:nth-child(3) { width:120px;height:120px;top:60%;left:5%;animation-duration:20s;animation-delay:-8s; }
  .bg-circles span:nth-child(4) { width:220px;height:220px;top:70%;left:65%;animation-duration:22s;animation-delay:-2s; }
  .bg-circles span:nth-child(5) { width:50px;height:50px;top:35%;left:90%;animation-duration:12s;animation-delay:-6s; }
  .bg-circles span:nth-child(6) { width:90px;height:90px;top:85%;left:30%;animation-duration:16s;animation-delay:-10s; }

  @keyframes floatDot {
    0%,100% { transform: translateY(0) scale(1); opacity: 0.06; }
    50%      { transform: translateY(-30px) scale(1.05); opacity: 0.1; }
  }

  /* Card */
  .card {
    position: relative; z-index: 10;
    background: var(--white);
    border-radius: 24px;
    width: 100%; max-width: 420px;
    margin: 24px;
    box-shadow: 0 1px 2px rgba(0,162,199,0.08), 0 8px 32px rgba(0,130,160,0.12), 0 32px 64px rgba(13,27,42,0.08);
    overflow: hidden;
    animation: cardIn 0.65s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Header — same gradient stripe as dashboard */
  .card-header {
    background: linear-gradient(135deg, var(--sofi-blue) 0%, #00BFE8 100%);
    padding: 32px 32px 28px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Decorative circles in header */
  .hc { position: absolute; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }
  .hc1 { width:90px;height:90px;top:-10px;right:10px; }
  .hc2 { width:55px;height:55px;top:40px;right:5px;background:rgba(255,255,255,0.08); }
  .hc3 { width:32px;height:32px;top:8px;right:68px;background:rgba(255,255,255,0.12); }
  .hc4 { width:13px;height:13px;top:58px;right:70px;background:rgba(255,255,255,0.3);border:none; }
  .hc5 { width:70px;height:70px;bottom:-20px;left:-15px;background:rgba(255,255,255,0.06);border:none; }

  /* Logo mark + wordmark */
  .sofi-logo { display:flex;align-items:center;gap:12px;margin-bottom:10px; }
  .portal-logo { height:36px;width:auto;object-fit:contain;filter:brightness(0) invert(1); }
  .sofi-logo-divider { width:1.5px;height:28px;background:rgba(255,255,255,0.35);border-radius:2px; }
  .sofi-logo-mark {
    width:40px;height:40px;
    background:rgba(255,255,255,0.2);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
  }
  .sofi-logo-mark::after { content:'';width:16px;height:16px;border-radius:50%;background:white;opacity:0.9; }
  .sofi-wordmark { font-size:26px;font-weight:800;color:white;letter-spacing:-0.5px; }

  .header-subtitle {
    font-size:13px;font-weight:500;
    color:rgba(255,255,255,0.75);
    letter-spacing:1.4px;
    text-transform:uppercase;
  }

  /* Form body */
  .card-body { padding: 32px; }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1.6px;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .form-group { margin-bottom: 18px; }

  .form-input {
    width: 100%;
    padding: 13px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--dark);
    background: var(--bg);
    border: 1.5px solid rgba(0,162,199,0.15);
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }
  .form-input::placeholder { color: #AABBC8; font-weight: 400; }
  .form-input:focus {
    border-color: var(--sofi-blue);
    background: white;
    box-shadow: 0 0 0 3px rgba(0,162,199,0.12);
  }

  /* Forgot password */
  .forgot {
    text-align: right;
    margin-top: -10px;
    margin-bottom: 24px;
  }
  .forgot a {
    font-size: 12px;
    font-weight: 600;
    color: var(--sofi-blue);
    text-decoration: none;
  }
  .forgot a:hover { text-decoration: underline; }

  /* Divider */
  .divider { height:1px;background:linear-gradient(90deg,transparent,rgba(0,162,199,0.15),transparent);margin-bottom:24px; }

  /* Login button */
  .login-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--sofi-blue) 0%, #00BFE8 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 18px rgba(0,162,199,0.38);
  }
  .login-btn::before {
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 60%);
    pointer-events:none;
  }
  .login-btn:hover { transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,162,199,0.48); }
  .login-btn:active { transform:translateY(0);box-shadow:0 2px 8px rgba(0,162,199,0.25); }
  .btn-arrow { font-size:17px;transition:transform 0.2s ease; }
  .login-btn:hover .btn-arrow { transform:translateX(4px); }

  /* Footer */
  .card-footer {
    padding: 0 32px 28px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
  .card-footer a { color:var(--sofi-blue);font-weight:600;text-decoration:none; }
  .card-footer a:hover { text-decoration:underline; }
</style>
</head>
<body>

  <div class="bg-circles">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="hc hc1"></div>
      <div class="hc hc2"></div>
      <div class="hc hc3"></div>
      <div class="hc hc4"></div>
      <div class="hc hc5"></div>
      <div class="sofi-logo">
        <img src="logo.png" alt="Logo" class="portal-logo">
        <div class="sofi-logo-divider"></div>
        <div class="sofi-wordmark">SoFi</div>
      </div>
      <div class="header-subtitle">Applicant Portal</div>
    </div>

    <div class="card-body">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" placeholder="you@email.com">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" placeholder="••••••••">
      </div>

      <div class="forgot"><a href="#">Forgot password?</a></div>

      <div class="divider"></div>

      <button class="login-btn" onclick="location.href='dashboard.html'">
        Log In <span class="btn-arrow">→</span>
      </button>
    </div>

    <div class="card-footer">
      Don't have an account? <a href="#">Apply now</a>
    </div>
  </div>

</body>
</html>
